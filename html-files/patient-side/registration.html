<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Forum&family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playpen+Sans:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
   <div class="container-fluid" style="box-shadow: 0px 1px 5px 0px #00000040;
">
     <div class="container">
        <div class="d-flex justify-content-between py-2 align-items-center">
         <div class="logo">
        <img src="../../assets/image/Group 112.png" alt="">
    </div>
    <div class="reg-nav">
        <ul class="d-flex gap-5">
            <li>Home</li>
            <li>Service</li>
            <li>About Us</li>
            <li>Contact</li>
        </ul>
    </div>
    <div >
        <a href="../patient-side/patientlogin.html " class="btn-login" >Login</a>
    </div>
     
    </div>
   </div>
    

     </div>


     <div class="main-content mt-3">
        <div class="container">
            <div class=" registration-heading"><h5>Patient Registration</h5>
             <span>Please fill out the form below to register as a new patients</span>
            </div>
            <div class=" registration-heading2">
                Personal Information
            </div>
             <div class="container ">

          <div class="container">

            <div class="row g-4 mt-1">
              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control">
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Patient ID</label>
                <div class="input-icon ">
                  <input type="text" class="form-control" readonly placeholder="PT1850010" style="background-color: #D1D1D633;
"/>
                </div>
              </div>
            </div>
  <div class="row g-4 mt-1">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Gender<span>*</span></label>
                <div class="input-icon">
                  <select class="form-select">
                    <option selected>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Date of Birth <span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control" placeholder="DD/MM/YYYY" />
                  <i class="fa-regular fa-calendar-days"></i>
                </div>
              </div>
            </div>
            <div class="row g-4 mt-1">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Contact Number.<span>*</span></label>
                <div class="input-icon position-relative">
                  <input type="text" class="form-control ps-5">
                  <div class="flag-img position-absolute top-50 start-0 translate-middle-y ps-2 d-flex align-items-center gap-1">
                    <img src="../../assets/image/openmoji_flag-india.png" alt="" width="20">
                    <span>+91</span>
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email Address<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control" />
                </div>
              </div>
            </div>

            <div class="row">
              <div class="addr-info-patient mt-3 fw-semibold">Address Information</div>
            </div>

            <div class="row g-4 mt-1">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Address 1<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control">
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Address 2<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control" />
                </div>
              </div>
            </div>

            <div class="row g-4 mt-1">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Pin Code<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control">
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">State<span>*</span></label>
                <div class="input-icon">
                   <select class="form-select">
                    <option selected>Select</option>
                    <option>Gujarat</option>
                    <option></option>
                  </select>
                </div>
              </div>
            </div>
             <div class="row">
              <div class="addr-info-patient mt-3 fw-semibold">Emergency Contact</div>
            </div>
            <div class="row">
                 <div class="col">
                <label class="form-label fw-semibold">Name<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control">
                </div>
              </div>
                <div class="col">
                <label class="form-label fw-semibold">Contact Number<span>*</span></label>
                <div class="input-icon">
                  <input type="text" class="form-control">
                </div>
              </div>

              <div class="col">
                <label class="form-label fw-semibold">Relationship<span>*</span></label>
                <div class="input-icon">
                  <select class="form-select">
                    <option selected>Select</option>
                    <option></option>
                    <option></option>
                  </select>
                </div>
              </div>
            </div>
            <button class="appoinment-btn offset-5 my-4" style="border: none;">
            Submit
            </button>
          </div>
        </div>
        </div>
     </div>
     
</body>
</html>
