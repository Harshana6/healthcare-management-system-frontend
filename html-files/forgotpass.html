<body>
     <div class="container my-2">
    <div class="d-flex align-items-center justify-content-between ">
         <div class="logo">
        <img src="../assets/image/Group 112.png" alt="">
    </div>
    <div class="login-icon ">
        <a href="./index.html"><img src="../assets/image/Frame 131.png" alt=""></a>
    </div>
    </div>
   </div>
   <div class="container-fluid header">
   </div>
  <div  class="p-md-5 p-3 m-3 m-md-5">
     <div class="admin-container container  w-50 px-5 ">
       <div class="text-center forgot-header pt-3 pb-5">
           <h5>Forgot Your Password</h5>
           <h6>Please create your new password for login</h6>
       </div>
      <div>
         <label for="email" class="mb-2 mx-3">Email</label> <br>
         <div class="input-container mb-3 ">
   <div class="symbol px-3">
    <img src="../assets/image/ic_baseline-email.png" width="24" />
</div>
  <input type="email" class="w-100 px-5 " placeholder="Enter Email Address" id="email" >
</div>
<label for="password" class="mb-3 mx-3"> Create New Password</label> <br>
 <div class="input-container ">
   <div class="symbol px-3">
    <img src="../assets/image/gridicons_lock.png" width="24" />
</div>
  <input type="password" class="w-100 px-5 password" placeholder="New Password"  >
  <div class="show-btn" >show</div>
</div>
<label for="password" class="my-3 mx-3">Confirm Password</label> <br>
 <div class="input-container ">
   <div class="symbol px-3">
    <img src="../assets/image/gridicons_lock.png" width="24" />
</div>
  <input type="password" class="w-100 px-5 password " placeholder="Confirm New Password"  >
  <div class="show-btn" >show</div>
</div>

  <div class="login-btn w-100 d-flex align-center justify-content-center p-2 my-3">
   <a href="">Next</a>
   <hr>
  </div> 
  
  
      </div>
    

    </div>
  </div>
     <script>
    
       const showBtns = document.querySelectorAll(".show-btn");

  showBtns.forEach((btn) => {
    btn.addEventListener("click", () => {
      const input = btn.parentElement.querySelector("input");

      if (input.type === "password") {
        input.type = "text";
        btn.innerText = "hide";
      } else {
        input.type = "password";
        btn.innerText = "show";
      }
    });
  });
 
    </script>
</body>
